version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    assignees:
      - puran2006-lgtm
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    assignees:
      - puran2006-lgtm
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps):"
