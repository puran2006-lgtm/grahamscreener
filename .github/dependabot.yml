version: 2

updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Australia/Adelaide"
    open-pull-requests-limit: 5
    assignees:
      - "puran2006-lgtm"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      patches:
        update-types:
          - "patch"
      minors:
        update-types:
          - "minor"
    ignore:
      # Block all major version bumps — require manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    assignees:
      - "puran2006-lgtm"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
